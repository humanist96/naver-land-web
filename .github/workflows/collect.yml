name: Collect Naver Land Listings

on:
  schedule:
    # 주요 시간대 2시간 간격 (KST 06~22시 = UTC 21~13시)
    - cron: '0 21,23,1,3,5,7,9,11,13 * * *'
  workflow_dispatch: # 수동 실행 지원

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install CLI dependencies
        run: |
          cd cli-naver-land
          pip install -e .

      - name: Install collection script dependencies
        run: pip install supabase

      - name: Run collection
        run: python scripts/collect.py

      - name: Report status
        if: always()
        run: echo "Collection completed at $(date -u)"
