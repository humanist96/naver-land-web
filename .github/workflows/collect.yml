name: Collect Naver Land Listings

on:
  schedule:
    # KST 06~22시, 2시간 간격 (UTC: 21,23,01,03,05,07,09,11,13)
    - cron: '0 21,23,1,3,5,7,9,11,13 * * *'
  workflow_dispatch:

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase

      - name: Run collection
        run: python scripts/collect.py

      - name: Report
        if: always()
        run: echo "Done at $(date -u)"
