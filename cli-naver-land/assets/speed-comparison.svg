<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <defs>
    <linearGradient id="bar-old" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar-new" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2EC4B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20A4F3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="280" rx="10" fill="#0D1117"/>
  <!-- Title -->
  <text x="300" y="35" font-family="system-ui, sans-serif" font-size="16" fill="#E2E8F0" text-anchor="middle" font-weight="700">Search Performance Comparison</text>
  <text x="300" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">search complex -n 목동7단지 -t 매매 (54 listings)</text>
  <!-- Old method -->
  <text x="30" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8" font-weight="600">Region Scan</text>
  <text x="30" y="116" font-family="monospace" font-size="10" fill="#64748B">search_region → filter</text>
  <rect x="165" y="88" width="400" height="32" rx="6" fill="url(#bar-old)" opacity="0.9"/>
  <text x="555" y="109" font-family="monospace" font-size="13" fill="#fff" font-weight="700" text-anchor="end">~150s</text>
  <text x="180" y="109" font-family="monospace" font-size="10" fill="#fff" opacity="0.8">25 API calls</text>
  <!-- New method -->
  <text x="30" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8" font-weight="600">Redirect Search</text>
  <text x="30" y="181" font-family="monospace" font-size="10" fill="#64748B">302 → hscpNo → articles</text>
  <rect x="165" y="153" width="40" height="32" rx="6" fill="url(#bar-new)" opacity="0.9"/>
  <text x="215" y="174" font-family="monospace" font-size="13" fill="#2EC4B6" font-weight="700">~15s</text>
  <text x="265" y="174" font-family="monospace" font-size="10" fill="#64748B">4 API calls</text>
  <!-- Speed badge -->
  <rect x="330" y="155" width="80" height="26" rx="13" fill="#2EC4B6" opacity="0.2"/>
  <text x="370" y="173" font-family="system-ui, sans-serif" font-size="12" fill="#2EC4B6" text-anchor="middle" font-weight="700">10x faster</text>
  <!-- Legend -->
  <line x1="165" y1="225" x2="565" y2="225" stroke="#1E293B" stroke-width="1"/>
  <text x="300" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Time (seconds) →</text>
  <!-- Scale markers -->
  <text x="165" y="248" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">0</text>
  <text x="271" y="248" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">30s</text>
  <text x="378" y="248" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">60s</text>
  <text x="485" y="248" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">90s</text>
  <text x="565" y="248" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">150s</text>
  <line x1="165" y1="228" x2="165" y2="235" stroke="#475569" stroke-width="1"/>
  <line x1="271" y1="228" x2="271" y2="235" stroke="#475569" stroke-width="1"/>
  <line x1="378" y1="228" x2="378" y2="235" stroke="#475569" stroke-width="1"/>
  <line x1="485" y1="228" x2="485" y2="235" stroke="#475569" stroke-width="1"/>
  <line x1="565" y1="228" x2="565" y2="235" stroke="#475569" stroke-width="1"/>
</svg>
